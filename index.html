<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>四字熟語タイピング練習</title>
  <style>
    :root{
      --bg:#8b7b2f;
      --bg-deep:#756725;
      --panel:rgba(255,255,255,.18);
      --panel-strong:rgba(255,255,255,.28);
      --line:rgba(0,0,0,.18);
      --text:#101010;
      --sub:#2c2a1d;
      --accent:#5f3dc4;
      --ok:#0f6d3b;
      --miss:#9c1f1f;
      --typed:#4d2ca8;
      --typed-bg:rgba(77,44,168,.10);
      --shadow:0 16px 40px rgba(0,0,0,.18);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.10), transparent 30%),
        linear-gradient(180deg, #958538 0%, var(--bg) 45%, var(--bg-deep) 100%);
      color:var(--text);
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .app{
      width:min(1100px,100%);
      min-height:86vh;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:18px;
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px 18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
    }

    .title{
      font-size:clamp(20px,2.6vw,30px);
      font-weight:800;
      letter-spacing:.05em;
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    .mode-btn{
      border:none;
      background:rgba(255,255,255,.42);
      color:var(--text);
      padding:10px 16px;
      border-radius:999px;
      cursor:pointer;
      font-weight:800;
      letter-spacing:.04em;
      box-shadow:0 3px 10px rgba(0,0,0,.08);
      transition:.15s transform,.15s background,.15s box-shadow;
    }
    .mode-btn:hover{ transform:translateY(-1px); background:rgba(255,255,255,.56); }
    .mode-btn.active{
      background:var(--text);
      color:#d8cb79;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }

    .main{
      display:grid;
      place-items:center;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:30px;
      padding:28px 20px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .center{
      width:min(900px,100%);
      text-align:center;
      display:grid;
      gap:20px;
    }

    .status-line{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
    }

    .badge{
      background:rgba(255,255,255,.35);
      border:1px solid rgba(0,0,0,.08);
      border-radius:999px;
      padding:8px 14px;
      font-weight:700;
      color:var(--sub);
    }

    .kanji{
      font-size:clamp(42px,8vw,90px);
      font-weight:900;
      letter-spacing:.12em;
      line-height:1.15;
      min-height:1.2em;
      text-shadow:0 2px 0 rgba(255,255,255,.15);
    }

    .reading{
      font-size:clamp(18px,2.5vw,30px);
      font-weight:700;
      color:var(--sub);
      letter-spacing:.08em;
      min-height:1.4em;
      word-break:break-all;
    }

    .typing{
      background:rgba(255,255,255,.34);
      border:1px solid rgba(0,0,0,.10);
      border-radius:24px;
      padding:20px;
      min-height:96px;
      display:grid;
      align-items:center;
    }

    .romaji{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:clamp(22px,3vw,38px);
      line-height:1.5;
      letter-spacing:.04em;
      word-break:break-all;
    }

    .done{
      color:var(--typed);
      background:var(--typed-bg);
      border-radius:10px;
      padding:0 .08em;
    }
    .rest{
      color:rgba(0,0,0,.72);
    }
    .cursor{
      display:inline-block;
      width:.65em;
      text-align:center;
      color:var(--accent);
      animation:blink 1s step-end infinite;
      font-weight:900;
    }
    @keyframes blink{
      50%{ opacity:0; }
    }

    .message{
      min-height:1.6em;
      font-size:clamp(16px,2vw,22px);
      font-weight:800;
      color:var(--sub);
    }
    .message.ok{ color:var(--ok); }
    .message.miss{ color:var(--miss); }

    .bottom{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }

    .stat{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px 14px;
      box-shadow:var(--shadow);
      text-align:center;
    }
    .stat .label{
      font-size:13px;
      color:var(--sub);
      font-weight:800;
      letter-spacing:.08em;
    }
    .stat .value{
      margin-top:8px;
      font-size:clamp(22px,3vw,36px);
      font-weight:900;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:none;
      place-items:center;
      background:rgba(0,0,0,.24);
      backdrop-filter:blur(2px);
      z-index:5;
    }
    .overlay.show{ display:grid; }

    .count{
      width:160px;
      height:160px;
      border-radius:50%;
      display:grid;
      place-items:center;
      font-size:72px;
      font-weight:900;
      background:rgba(255,255,255,.74);
      color:var(--text);
      box-shadow:0 18px 40px rgba(0,0,0,.24);
    }

    .help{
      font-size:14px;
      color:rgba(0,0,0,.82);
      margin-top:4px;
      line-height:1.7;
    }

    .result-panel{
      margin-top:8px;
      background:rgba(255,255,255,.32);
      border:1px solid rgba(0,0,0,.10);
      border-radius:20px;
      padding:16px;
      display:none;
    }
    .result-panel.show{ display:block; }
    .result-title{
      font-size:24px;
      font-weight:900;
      margin-bottom:10px;
    }
    .result-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
    }
    .result-card{
      background:rgba(255,255,255,.35);
      border-radius:16px;
      padding:12px;
    }
    .result-card .r-label{
      font-size:13px;
      font-weight:800;
      color:var(--sub);
    }
    .result-card .r-value{
      margin-top:6px;
      font-size:30px;
      font-weight:900;
    }

    @media (max-width:900px){
      .bottom{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
      .result-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:640px){
      .topbar{
        justify-content:center;
      }
      .bottom{
        grid-template-columns:1fr;
      }
      .kanji{
        letter-spacing:.06em;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="title">四字熟語タイピング練習</div>
        <div class="help">
          スペースキーで 3 秒カウントダウン後に開始。<br>
          プレイ中にもう一度スペースキーで中断。無限モードは正解後 Enter で次へ、Enter を押さなければ同じ熟語を繰り返し練習。
        </div>
      </div>

      <div class="controls" id="modeButtons">
        <button class="mode-btn active" data-mode="10">10問</button>
        <button class="mode-btn" data-mode="30">30問</button>
        <button class="mode-btn" data-mode="50">50問</button>
        <button class="mode-btn" data-mode="infinite">無限</button>
      </div>
    </div>

    <div class="main">
      <div class="overlay" id="overlay">
        <div class="count" id="countText">3</div>
      </div>

      <div class="center">
        <div class="status-line">
          <div class="badge" id="modeLabel">モード：10問</div>
          <div class="badge" id="runLabel">待機中</div>
        </div>

        <div class="kanji" id="kanji">四字熟語</div>
        <div class="reading" id="reading">よじじゅくご</div>

        <div class="typing">
          <div class="romaji" id="romajiView"></div>
        </div>

        <div class="message" id="message">スペースキーで開始</div>

        <div class="result-panel" id="resultPanel">
          <div class="result-title">結果</div>
          <div class="result-grid">
            <div class="result-card">
              <div class="r-label">クリア数</div>
              <div class="r-value" id="resultClear">0</div>
            </div>
            <div class="result-card">
              <div class="r-label">正確率</div>
              <div class="r-value" id="resultAcc">0%</div>
            </div>
            <div class="result-card">
              <div class="r-label">タイム</div>
              <div class="r-value" id="resultTime">0.0s</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <div class="stat">
        <div class="label">進行</div>
        <div class="value" id="progressValue">0 / 10</div>
      </div>
      <div class="stat">
        <div class="label">ミス</div>
        <div class="value" id="missValue">0</div>
      </div>
      <div class="stat">
        <div class="label">正確率</div>
        <div class="value" id="accValue">100%</div>
      </div>
      <div class="stat">
        <div class="label">経過時間</div>
        <div class="value" id="timeValue">0.0s</div>
      </div>
    </div>
  </div>

  <script>
    const WORDS = [
      {kanji:"一期一会", kana:"いちごいちえ"},
      {kanji:"異口同音", kana:"いくどうおん"},
      {kanji:"以心伝心", kana:"いしんでんしん"},
      {kanji:"一石二鳥", kana:"いっせきにちょう"},
      {kanji:"一進一退", kana:"いっしんいったい"},
      {kanji:"一念発起", kana:"いちねんほっき"},
      {kanji:"温故知新", kana:"おんこちしん"},
      {kanji:"我田引水", kana:"がでんいんすい"},
      {kanji:"起死回生", kana:"きしかいせい"},
      {kanji:"試行錯誤", kana:"しこうさくご"},
      {kanji:"自画自賛", kana:"じがじさん"},
      {kanji:"自業自得", kana:"じごうじとく"},
      {kanji:"十人十色", kana:"じゅうにんといろ"},
      {kanji:"縦横無尽", kana:"じゅうおうむじん"},
      {kanji:"千差万別", kana:"せんさばんべつ"},
      {kanji:"切磋琢磨", kana:"せっさたくま"},
      {kanji:"大器晩成", kana:"たいきばんせい"},
      {kanji:"単刀直入", kana:"たんとうちょくにゅう"},
      {kanji:"電光石火", kana:"でんこうせっか"},
      {kanji:"天真爛漫", kana:"てんしんらんまん"},
      {kanji:"独立独歩", kana:"どくりつどっぽ"},
      {kanji:"日進月歩", kana:"にっしんげっぽ"},
      {kanji:"二束三文", kana:"にそくさんもん"},
      {kanji:"馬耳東風", kana:"ばじとうふう"},
      {kanji:"半信半疑", kana:"はんしんはんぎ"},
      {kanji:"百発百中", kana:"ひゃっぱつひゃくちゅう"},
      {kanji:"付和雷同", kana:"ふわらいどう"},
      {kanji:"本末転倒", kana:"ほんまつてんとう"},
      {kanji:"明鏡止水", kana:"めいきょうしすい"},
      {kanji:"無我夢中", kana:"むがむちゅう"},
      {kanji:"無味乾燥", kana:"むみかんそう"},
      {kanji:"優柔不断", kana:"ゆうじゅうふだん"},
      {kanji:"用意周到", kana:"よういしゅうとう"},
      {kanji:"臨機応変", kana:"りんきおうへん"},
      {kanji:"和洋折衷", kana:"わようせっちゅう"},
      {kanji:"疑心暗鬼", kana:"ぎしんあんき"},
      {kanji:"公平無私", kana:"こうへいむし"},
      {kanji:"晴耕雨読", kana:"せいこううどく"},
      {kanji:"猪突猛進", kana:"ちょとつもうしん"},
      {kanji:"森羅万象", kana:"しんらばんしょう"},
      {kanji:"右往左往", kana:"うおうさおう"},
      {kanji:"因果応報", kana:"いんがおうほう"},
      {kanji:"前代未聞", kana:"ぜんだいみもん"},
      {kanji:"大胆不敵", kana:"だいたんふてき"},
      {kanji:"朝令暮改", kana:"ちょうれいぼかい"},
      {kanji:"破顔一笑", kana:"はがんいっしょう"},
      {kanji:"有言実行", kana:"ゆうげんじっこう"},
      {kanji:"四面楚歌", kana:"しめんそか"},
      {kanji:"八方美人", kana:"はっぽうびじん"},
      {kanji:"支離滅裂", kana:"しりめつれつ"}
    ];

    const BASIC = {
      "あ":"a","い":"i","う":"u","え":"e","お":"o",
      "か":"ka","き":"ki","く":"ku","け":"ke","こ":"ko",
      "さ":"sa","し":"si","す":"su","せ":"se","そ":"so",
      "た":"ta","ち":"ti","つ":"tu","て":"te","と":"to",
      "な":"na","に":"ni","ぬ":"nu","ね":"ne","の":"no",
      "は":"ha","ひ":"hi","ふ":"hu","へ":"he","ほ":"ho",
      "ま":"ma","み":"mi","む":"mu","め":"me","も":"mo",
      "や":"ya","ゆ":"yu","よ":"yo",
      "ら":"ra","り":"ri","る":"ru","れ":"re","ろ":"ro",
      "わ":"wa","を":"o",
      "が":"ga","ぎ":"gi","ぐ":"gu","げ":"ge","ご":"go",
      "ざ":"za","じ":"zi","ず":"zu","ぜ":"ze","ぞ":"zo",
      "だ":"da","ぢ":"di","づ":"du","で":"de","ど":"do",
      "ば":"ba","び":"bi","ぶ":"bu","べ":"be","ぼ":"bo",
      "ぱ":"pa","ぴ":"pi","ぷ":"pu","ぺ":"pe","ぽ":"po",
      "ぁ":"a","ぃ":"i","ぅ":"u","ぇ":"e","ぉ":"o",
      "ゔ":"vu"
    };

    const DIGRAPHS = {
      "きゃ":"kya","きゅ":"kyu","きょ":"kyo",
      "しゃ":"sya","しゅ":"syu","しょ":"syo",
      "ちゃ":"tya","ちゅ":"tyu","ちょ":"tyo",
      "にゃ":"nya","にゅ":"nyu","にょ":"nyo",
      "ひゃ":"hya","ひゅ":"hyu","ひょ":"hyo",
      "みゃ":"mya","みゅ":"myu","みょ":"myo",
      "りゃ":"rya","りゅ":"ryu","りょ":"ryo",
      "ぎゃ":"gya","ぎゅ":"gyu","ぎょ":"gyo",
      "じゃ":"zya","じゅ":"zyu","じょ":"zyo",
      "ぢゃ":"dya","ぢゅ":"dyu","ぢょ":"dyo",
      "びゃ":"bya","びゅ":"byu","びょ":"byo",
      "ぴゃ":"pya","ぴゅ":"pyu","ぴょ":"pyo"
    };

    function kanaTokenize(str){
      const arr = [];
      for(let i=0;i<str.length;i++){
        const two = str.slice(i,i+2);
        if(DIGRAPHS[two]){
          arr.push(two);
          i++;
        }else{
          arr.push(str[i]);
        }
      }
      return arr;
    }

    function getRomanForToken(token){
      if(DIGRAPHS[token]) return DIGRAPHS[token];
      if(BASIC[token]) return BASIC[token];
      if(token === "ー") return "-";
      return token;
    }

    function getInitialConsonant(roman){
      if(!roman) return "";
      const m = roman.match(/^[^aeiou]+/);
      return m ? m[0][0] : "";
    }

    function kanaToRomajiStrict(kana){
      const tokens = kanaTokenize(kana);
      let out = "";

      for(let i=0;i<tokens.length;i++){
        const t = tokens[i];

        if(t === "っ"){
          const next = tokens[i+1];
          const nextRoman = getRomanForToken(next);
          const c = getInitialConsonant(nextRoman);
          if(c) out += c;
          continue;
        }

        if(t === "ん"){
          const next = tokens[i+1];
          if(!next){
            out += "nn";
          }else{
            const nextRoman = getRomanForToken(next);
            if(/^[aiueoy]/.test(nextRoman)){
              out += "nn";
            }else{
              out += "n";
            }
          }
          continue;
        }

        out += getRomanForToken(t);
      }

      return out;
    }

    function shuffle(array){
      const a = [...array];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }

    const state = {
      mode:"10",
      isCounting:false,
      isRunning:false,
      isFinished:false,
      isInfinite:false,
      awaitingEnter:false,
      queue:[],
      current:null,
      currentIndex:0,
      typed:"",
      misses:0,
      totalKeys:0,
      correctKeys:0,
      startTime:0,
      timerId:null,
      countdownTimers:[],
      repeatCount:0
    };

    const el = {
      modeButtons:document.getElementById("modeButtons"),
      modeLabel:document.getElementById("modeLabel"),
      runLabel:document.getElementById("runLabel"),
      kanji:document.getElementById("kanji"),
      reading:document.getElementById("reading"),
      romajiView:document.getElementById("romajiView"),
      message:document.getElementById("message"),
      progressValue:document.getElementById("progressValue"),
      missValue:document.getElementById("missValue"),
      accValue:document.getElementById("accValue"),
      timeValue:document.getElementById("timeValue"),
      overlay:document.getElementById("overlay"),
      countText:document.getElementById("countText"),
      resultPanel:document.getElementById("resultPanel"),
      resultClear:document.getElementById("resultClear"),
      resultAcc:document.getElementById("resultAcc"),
      resultTime:document.getElementById("resultTime")
    };

    // 低めのパンチ音：極力遅延を減らすため事前生成バッファを使う
    let audioCtx = null;
    let punchBuffer = null;

    function ensureAudio(){
      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({
          latencyHint:"interactive"
        });
      }
      if(!punchBuffer){
        punchBuffer = createPunchBuffer(audioCtx);
      }
      if(audioCtx.state === "suspended"){
        audioCtx.resume();
      }
    }

    function createPunchBuffer(ctx){
      const duration = 0.055;
      const sampleRate = ctx.sampleRate;
      const length = Math.floor(sampleRate * duration);
      const buffer = ctx.createBuffer(1, length, sampleRate);
      const data = buffer.getChannelData(0);

      for(let i=0;i<length;i++){
        const t = i / sampleRate;
        const env = Math.exp(-42 * t);
        const tone =
          Math.sin(2 * Math.PI * 105 * t) * 0.85 +
          Math.sin(2 * Math.PI * 72 * t) * 0.45;
        const noise = (Math.random() * 2 - 1) * 0.22;
        data[i] = (tone + noise) * env * 0.95;
      }
      return buffer;
    }

    function playPunch(){
      if(!audioCtx || !punchBuffer) return;
      const src = audioCtx.createBufferSource();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      filter.type = "lowpass";
      filter.frequency.value = 1300;
      filter.Q.value = 0.7;

      gain.gain.value = 0.72;

      src.buffer = punchBuffer;
      src.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      const when = audioCtx.currentTime + 0.0005;
      src.start(when);
    }

    function setMode(mode){
      if(state.isRunning || state.isCounting) return;
      state.mode = mode;
      state.isInfinite = mode === "infinite";
      [...el.modeButtons.querySelectorAll(".mode-btn")].forEach(btn=>{
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });
      el.modeLabel.textContent = `モード：${mode === "infinite" ? "無限" : mode + "問"}`;
      resetIdleScreen();
    }

    function resetIdleScreen(){
      state.isFinished = false;
      state.awaitingEnter = false;
      state.current = null;
      state.currentIndex = 0;
      state.typed = "";
      state.misses = 0;
      state.totalKeys = 0;
      state.correctKeys = 0;
      state.repeatCount = 0;
      updateStats();
      el.runLabel.textContent = "待機中";
      el.kanji.textContent = "四字熟語";
      el.reading.textContent = "よじじゅくご";
      renderRomaji("");
      setMessage("スペースキーで開始", "");
      el.resultPanel.classList.remove("show");
    }

    function buildQueue(){
      const shuffled = shuffle(WORDS);
      if(state.isInfinite){
        return shuffled;
      }
      const count = Number(state.mode);
      const pool = [];
      while(pool.length < count){
        pool.push(...shuffle(WORDS));
      }
      return pool.slice(0, count);
    }

    function startCountdown(){
      if(state.isCounting || state.isRunning) return;
      ensureAudio();
      state.isCounting = true;
      el.resultPanel.classList.remove("show");
      el.overlay.classList.add("show");
      el.runLabel.textContent = "カウントダウン";
      setMessage("開始します", "");
      const seq = ["3","2","1","START"];
      el.countText.textContent = seq[0];

      state.countdownTimers.forEach(id=>clearTimeout(id));
      state.countdownTimers = [];

      seq.forEach((text,idx)=>{
        const id = setTimeout(()=>{
          el.countText.textContent = text;
        }, idx * 700);
        state.countdownTimers.push(id);
      });

      const endId = setTimeout(()=>{
        el.overlay.classList.remove("show");
        state.isCounting = false;
        beginGame();
      }, seq.length * 700);
      state.countdownTimers.push(endId);
    }

    function beginGame(){
      state.queue = buildQueue();
      state.currentIndex = 0;
      state.typed = "";
      state.misses = 0;
      state.totalKeys = 0;
      state.correctKeys = 0;
      state.repeatCount = 0;
      state.awaitingEnter = false;
      state.isRunning = true;
      state.isFinished = false;
      state.startTime = performance.now();
      if(state.timerId) cancelAnimationFrame(state.timerId);
      tickTimer();
      el.runLabel.textContent = "プレイ中";
      nextWord(true);
      updateStats();
    }

    function stopGame(manual = true){
      state.isCounting = false;
      state.isRunning = false;
      state.awaitingEnter = false;
      state.countdownTimers.forEach(id=>clearTimeout(id));
      state.countdownTimers = [];
      el.overlay.classList.remove("show");
      if(state.timerId) cancelAnimationFrame(state.timerId);
      el.runLabel.textContent = manual ? "中断" : "終了";
      if(manual){
        setMessage("停止しました。スペースキーで最初から再開", "");
      }
    }

    function finishGame(){
      state.isRunning = false;
      state.isFinished = true;
      state.awaitingEnter = false;
      if(state.timerId) cancelAnimationFrame(state.timerId);
      el.runLabel.textContent = "終了";
      setMessage("おつかれさまでした。スペースキーで再スタート", "ok");

      const cleared = state.currentIndex;
      const acc = calcAccuracy();
      const time = elapsedSec();

      el.resultClear.textContent = String(cleared);
      el.resultAcc.textContent = `${acc}%`;
      el.resultTime.textContent = `${time.toFixed(1)}s`;
      el.resultPanel.classList.add("show");
      updateStats();
    }

    function tickTimer(){
      if(!state.isRunning) return;
      el.timeValue.textContent = `${elapsedSec().toFixed(1)}s`;
      state.timerId = requestAnimationFrame(tickTimer);
    }

    function elapsedSec(){
      if(!state.startTime) return 0;
      const end = state.isRunning ? performance.now() : performance.now();
      return (end - state.startTime) / 1000;
    }

    function nextWord(initial = false){
      if(state.isInfinite){
        if(initial || !state.current){
          if(state.currentIndex === 0){
            state.queue = shuffle(WORDS);
          }
          const idx = state.currentIndex % state.queue.length;
          state.current = state.queue[idx];
          state.currentIndex = state.currentIndex || 0;
        }
      }else{
        if(state.currentIndex >= state.queue.length){
          finishGame();
          return;
        }
        state.current = state.queue[state.currentIndex];
      }

      state.current.roman = kanaToRomajiStrict(state.current.kana);
      state.typed = "";
      el.kanji.textContent = state.current.kanji;
      el.reading.textContent = state.current.kana;
      renderRomaji();
      updateStats();
      if(state.isInfinite){
        setMessage("入力して練習。正解後 Enter で次へ", "");
      }else{
        setMessage("入力開始", "");
      }
    }

    function repeatCurrentWord(){
      state.typed = "";
      renderRomaji();
      state.repeatCount++;
      updateStats();
      setMessage("同じ熟語をもう一度。Enter で次の熟語へ", "");
    }

    function renderRomaji(){
      const target = state.current?.roman || "";
      const done = escapeHtml(target.slice(0, state.typed.length));
      const rest = escapeHtml(target.slice(state.typed.length));
      el.romajiView.innerHTML = `
        <span class="done">${done}</span><span class="cursor">|</span><span class="rest">${rest}</span>
      `;
    }

    function escapeHtml(str){
      return str
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
    }

    function setMessage(text, type=""){
      el.message.textContent = text;
      el.message.className = "message" + (type ? ` ${type}` : "");
    }

    function calcAccuracy(){
      if(state.totalKeys === 0) return 100;
      return Math.max(0, Math.round((state.correctKeys / state.totalKeys) * 100));
    }

    function updateStats(){
      el.missValue.textContent = String(state.misses);
      el.accValue.textContent = `${calcAccuracy()}%`;

      if(state.isInfinite){
        el.progressValue.textContent = `${state.currentIndex} 語クリア / 同語反復 ${state.repeatCount}`;
      }else{
        el.progressValue.textContent = `${state.currentIndex} / ${state.mode}`;
      }

      if(!state.isRunning){
        if(state.isFinished){
          el.timeValue.textContent = `${elapsedSec().toFixed(1)}s`;
        }else if(!state.startTime){
          el.timeValue.textContent = "0.0s";
        }
      }
    }

    function advanceWordFinite(){
      state.currentIndex++;
      if(state.currentIndex >= state.queue.length){
        finishGame();
      }else{
        nextWord();
      }
      updateStats();
    }

    function advanceWordInfinite(){
      state.currentIndex++;
      state.awaitingEnter = false;
      const idx = state.currentIndex % state.queue.length;
      if(idx === 0){
        state.queue = shuffle(WORDS);
      }
      state.current = state.queue[idx];
      state.current.roman = kanaToRomajiStrict(state.current.kana);
      state.typed = "";
      el.kanji.textContent = state.current.kanji;
      el.reading.textContent = state.current.kana;
      renderRomaji();
      updateStats();
      setMessage("入力して練習。正解後 Enter で次へ", "");
    }

    function onCorrectComplete(){
      if(state.isInfinite){
        state.awaitingEnter = true;
        setMessage("正解。Enter で次へ / そのまま同じ熟語を繰り返し練習", "ok");
        setTimeout(()=>{
          if(state.awaitingEnter && state.isRunning){
            repeatCurrentWord();
          }
        }, 180);
      }else{
        setMessage("正解", "ok");
        setTimeout(()=>{
          if(state.isRunning){
            advanceWordFinite();
          }
        }, 220);
      }
    }

    function handleTypingKey(key){
      if(!state.current) return;
      const target = state.current.roman;

      if(state.awaitingEnter && state.isInfinite){
        if(key === "Enter"){
          advanceWordInfinite();
          return;
        }
        if(/^[a-z]$/.test(key)){
          repeatCurrentWord();
        }else{
          return;
        }
      }

      if(!/^[a-z]$/.test(key)) return;

      ensureAudio();
      playPunch();

      state.totalKeys++;
      const expected = target[state.typed.length];

      if(key === expected){
        state.correctKeys++;
        state.typed += key;
        renderRomaji();

        if(state.typed === target){
          onCorrectComplete();
        }else{
          setMessage("入力中", "");
        }
      }else{
        state.misses++;
        setMessage(`ミス：次は "${expected}"`, "miss");
      }

      updateStats();
    }

    document.addEventListener("keydown",(e)=>{
      const key = e.key;

      if(key === " " || key === "Spacebar"){
        e.preventDefault();
        ensureAudio();

        if(state.isCounting){
          stopGame(true);
          return;
        }

        if(state.isRunning){
          stopGame(true);
          return;
        }

        startCountdown();
        return;
      }

      if(!state.isRunning) return;

      if(key === "Enter"){
        e.preventDefault();
        if(state.isInfinite && state.awaitingEnter){
          advanceWordInfinite();
        }
        return;
      }

      if(key.length === 1 && /^[a-zA-Z]$/.test(key)){
        e.preventDefault();
        handleTypingKey(key.toLowerCase());
      }
    });

    el.modeButtons.addEventListener("click",(e)=>{
      const btn = e.target.closest(".mode-btn");
      if(!btn) return;
      setMode(btn.dataset.mode);
    });

    // 初期表示
    setMode("10");
  </script>
</body>
</html>
