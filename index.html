<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>四字熟語ローマ字タイピング</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel2: #1d2230;
      --text: #eef2ff;
      --muted: #98a2b3;
      --accent: #7c9cff;
      --accent2: #9bffb0;
      --danger: #ff7a7a;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background:
        radial-gradient(circle at top, rgba(124,156,255,0.18), transparent 30%),
        linear-gradient(180deg, #0b0d12, #111521 40%, #0c0f16);
      color: var(--text);
      min-height: 100vh;
      letter-spacing: 0.02em;
    }

    .wrap {
      width: min(1100px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 20px 0 48px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .title {
      font-size: clamp(22px, 2.5vw, 30px);
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .mode-panel, .main-panel, .info-panel, .rank-panel {
      background: rgba(23,26,33,0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .mode-panel {
      padding: 14px;
      margin-bottom: 16px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }

    .mode-btn, .control-btn {
      appearance: none;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #232939, #1a1f2d);
      color: var(--text);
      border-radius: 14px;
      padding: 14px 10px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.15s ease, background 0.15s ease, opacity 0.15s ease;
      user-select: none;
    }
    .mode-btn:hover, .control-btn:hover { border-color: rgba(124,156,255,0.55); }
    .mode-btn:active, .control-btn:active { transform: scale(0.98); }
    .mode-btn.active {
      background: linear-gradient(180deg, #3c57b8, #293b83);
      border-color: rgba(255,255,255,0.18);
    }

    .main-panel {
      min-height: 52vh;
      display: grid;
      place-items: center;
      padding: 28px 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .center {
      width: min(900px, 100%);
      text-align: center;
    }

    .status-mini {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
      min-height: 20px;
    }

    .kanji {
      font-size: clamp(42px, 8vw, 88px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0.12em;
      margin: 8px 0 8px;
      text-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .kana {
      font-size: clamp(18px, 2.3vw, 24px);
      color: #c7d2fe;
      letter-spacing: 0.08em;
      margin-bottom: 26px;
    }

    .typing-line {
      width: min(900px, 100%);
      min-height: 92px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.025));
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 20px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: clamp(18px, 2.8vw, 36px);
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .typed-correct { color: var(--accent2); }
    .typed-wrong { color: var(--danger); }
    .typed-rest { color: rgba(255,255,255,0.36); }
    .cursor {
      display: inline-block;
      width: 0.6em;
      color: var(--accent);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .hint {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      min-height: 19px;
    }

    .info-panel {
      padding: 16px;
      margin-bottom: 24px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .info-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 12px;
      min-height: 82px;
    }

    .info-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .info-value {
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 900;
      letter-spacing: 0.03em;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .control-btn {
      padding: 12px 16px;
      font-size: 14px;
    }

    .rank-panel {
      padding: 16px;
      scroll-margin-top: 16px;
    }

    .panel-title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .rank-note {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      background: rgba(255,255,255,0.02);
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-align: left;
      font-size: 14px;
    }

    th {
      background: rgba(255,255,255,0.04);
      color: #dbe4ff;
      font-size: 13px;
    }

    tr:last-child td { border-bottom: none; }

    .empty {
      color: var(--muted);
      padding: 18px 6px 4px;
      font-size: 14px;
    }

    .footer-space {
      height: 18px;
    }

    @media (max-width: 920px) {
      .mode-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .info-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .wrap { width: min(100vw - 20px, 1100px); }
      .mode-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .info-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .main-panel { min-height: 48vh; padding: 22px 14px; }
      .typing-line { min-height: 80px; }
    }
  </style>
</head>
<body>

      ];

      const modes = [

        { label: "20問", value: 20 },
        { label: "30問", value: 30 },
        { label: "40問", value: 40 },
        { label: "50問", value: 50 },

        { label: "∞", value: Infinity }
      ];

      const modeGrid = document.getElementById("modeGrid");
      const kanjiDisplay = document.getElementById("kanjiDisplay");
      const kanaDisplay = document.getElementById("kanaDisplay");
      const typingLine = document.getElementById("typingLine");
      const hintLine = document.getElementById("hintLine");
      const statusMini = document.getElementById("statusMini");

      const modeValue = document.getElementById("modeValue");
      const progressValue = document.getElementById("progressValue");
      const timeValue = document.getElementById("timeValue");
      const accuracyValue = document.getElementById("accuracyValue");
      const missValue = document.getElementById("missValue");
      const wpmValue = document.getElementById("wpmValue");

      const restartBtn = document.getElementById("restartBtn");
      const soundBtn = document.getElementById("soundBtn");
      const rankResetBtn = document.getElementById("rankResetBtn");
      const rankArea = document.getElementById("rankArea");

      const STORAGE_KEY = "yojijukugo_typing_rank_v1";

      const state = {
        mode: null,
        totalQuestions: 0,
        started: false,
        finished: false,
        startTime: null,
        elapsedMs: 0,
        index: 0,
        queue: [],
        current: null,
        accepted: "",
        displayGuide: "",
        mistakes: 0,
        typedCount: 0,
        correctCount: 0,
        keySoundOn: true,
        audioCtx: null,
        timerId: null
      };

      const kanaMap = {
        "あ":["a"], "い":["i","yi"], "う":["u","wu","whu"], "え":["e"], "お":["o"],
        "か":["ka","ca"], "き":["ki"], "く":["ku","cu","qu"], "け":["ke"], "こ":["ko","co"],
        "さ":["sa"], "し":["shi","si","ci"], "す":["su"], "せ":["se","ce"], "そ":["so"],
        "た":["ta"], "ち":["chi","ti"], "つ":["tsu","tu"], "て":["te"], "と":["to"],
        "な":["na"], "に":["ni"], "ぬ":["nu"], "ね":["ne"], "の":["no"],
        "は":["ha"], "ひ":["hi"], "ふ":["fu","hu"], "へ":["he"], "ほ":["ho"],
        "ま":["ma"], "み":["mi"], "む":["mu"], "め":["me"], "も":["mo"],
        "や":["ya"], "ゆ":["yu"], "よ":["yo"],
        "ら":["ra"], "り":["ri"], "る":["ru"], "れ":["re"], "ろ":["ro"],
        "わ":["wa"], "を":["wo","o"],
        "ん":["n","nn","n'"],
        "が":["ga"], "ぎ":["gi"], "ぐ":["gu"], "げ":["ge"], "ご":["go"],
        "ざ":["za"], "じ":["ji","zi"], "ず":["zu"], "ぜ":["ze"], "ぞ":["zo"],
        "だ":["da"], "ぢ":["ji","di"], "づ":["zu","du"], "で":["de"], "ど":["do"],
        "ば":["ba"], "び":["bi"], "ぶ":["bu"], "べ":["be"], "ぼ":["bo"],
        "ぱ":["pa"], "ぴ":["pi"], "ぷ":["pu"], "ぺ":["pe"], "ぽ":["po"],
        "ぁ":["xa","la"], "ぃ":["xi","li","yi"], "ぅ":["xu","lu"], "ぇ":["xe","le"], "ぉ":["xo","lo"],
        "ゃ":["xya","lya"], "ゅ":["xyu","lyu"], "ょ":["xyo","lyo"],
        "ゔ":["vu"],
        "ー":["-"]
      };

      const digraphMap = {
        "きゃ":["kya"], "きゅ":["kyu"], "きょ":["kyo"],
        "しゃ":["sha","sya"], "しゅ":["shu","syu"], "しょ":["sho","syo"],
        "ちゃ":["cha","cya","tya"], "ちゅ":["chu","cyu","tyu"], "ちょ":["cho","cyo","tyo"],
        "にゃ":["nya"], "にゅ":["nyu"], "にょ":["nyo"],
        "ひゃ":["hya"], "ひゅ":["hyu"], "ひょ":["hyo"],
        "みゃ":["mya"], "みゅ":["myu"], "みょ":["myo"],
        "りゃ":["rya"], "りゅ":["ryu"], "りょ":["ryo"],
        "ぎゃ":["gya"], "ぎゅ":["gyu"], "ぎょ":["gyo"],
        "じゃ":["ja","jya","zya"], "じゅ":["ju","jyu","zyu"], "じょ":["jo","jyo","zyo"],
        "ぢゃ":["ja","dya"], "ぢゅ":["ju","dyu"], "ぢょ":["jo","dyo"],
        "びゃ":["bya"], "びゅ":["byu"], "びょ":["byo"],
        "ぴゃ":["pya"], "ぴゅ":["pyu"], "ぴょ":["pyo"],
        "てぃ":["thi","ti"], "でぃ":["dhi","di"],
        "とぅ":["twu","tu"], "どぅ":["dwu","du"],
        "しぇ":["she","sye"], "ちぇ":["che","tye","cye"], "じぇ":["je","jye","zye"],
        "ふぁ":["fa"], "ふぃ":["fi"], "ふぇ":["fe"], "ふぉ":["fo"],
        "うぃ":["wi"], "うぇ":["we"], "うぉ":["who","wo"],
        "ヴぁ":["va"], "ヴぃ":["vi"], "ヴぇ":["ve"], "ヴぉ":["vo"],

        "りぇ":["rye"], "みぇ":["mye"], "ひぇ":["hye"], "にぇ":["nye"],
        "ぎぇ":["gye"], "びぇ":["bye"], "ぴぇ":["pye"], "しぃ":["syi","shi"], "ちぃ":["tyi","chi"]
      };

      function uniq(arr) {
        return [...new Set(arr)];
      }

      function firstEffectiveConsonant(roma) {
        const m = roma.match(/^[^aeiouxn]/);
        return m ? m[0] : "";
      }

      function buildRomanizations(kana) {
        const memo = new Map();

        function dfs(i) {
          const key = i;
          if (memo.has(key)) return memo.get(key);
          if (i >= kana.length) return [""];

          let results = [];

          const two = kana.slice(i, i + 2);
          const one = kana[i];

          if (one === "っ") {
            const nextParts = dfs(i + 1);
            const doubled = [];
            for (const p of nextParts) {
              const c = firstEffectiveConsonant(p);
              if (c) doubled.push(c + p);
              doubled.push("xtu" + p, "ltu" + p, "xtsu" + p, "ltsu" + p);
            }
            results = results.concat(doubled);
          } else if (two && digraphMap[two]) {
            const tails = dfs(i + 2);
            for (const head of digraphMap[two]) {
              for (const tail of tails) results.push(head + tail);
            }
          } else if (kanaMap[one]) {
            const tails = dfs(i + 1);
            for (const head of kanaMap[one]) {
              for (const tail of tails) {
                if (one === "ん" && (head === "n" || head === "n'")) {
                  if (tail[0] && "aiueoyn".includes(tail[0])) {
                    results.push("nn" + tail);
                    results.push("n'" + tail);
                    continue;
                  }
                  if (tail[0] && "bmp".includes(tail[0])) results.push("m" + tail);
                }
                results.push(head + tail);
              }
            }
          } else {
            const tails = dfs(i + 1);
            for (const tail of tails) results.push(one + tail);
          }

          results = uniq(results).filter(v => v.length <= 64);
          memo.set(key, results);
          return results;
        }

        return uniq(dfs(0));
      }

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function createQueue(count) {
        if (count === Infinity) return [];
        const need = count;
        const out = [];
        while (out.length < need) out.push(...shuffle(idioms));
        return shuffle(out).slice(0, need);
      }

      function getInfiniteItem() {
        return idioms[Math.floor(Math.random() * idioms.length)];
      }

      function getCurrentCandidates() {
        return state.current ? state.current.candidates : [];
      }

      function getMatchingCandidates(prefix) {
        return getCurrentCandidates().filter(c => c.startsWith(prefix));
      }

      function getShortestMatch(prefix) {
        const matches = getMatchingCandidates(prefix);
        matches.sort((a, b) => a.length - b.length || a.localeCompare(b));
        return matches[0] || "";
      }

      function renderTyping() {
        if (!state.current) {
          typingLine.innerHTML = '<span class="typed-rest">モードを選択してください</span>';
          return;
        }

        const best = getShortestMatch(state.accepted) || "";
        const correct = escapeHtml(state.accepted);
        const rest = escapeHtml(best.slice(state.accepted.length));
        typingLine.innerHTML =
          `<span class="typed-correct">${correct}</span>` +
          `<span class="cursor">|</span>` +
          `<span class="typed-rest">${rest}</span>`;

        const candidates = getMatchingCandidates(state.accepted);
        const nextChars = uniq(
          candidates.map(c => c[state.accepted.length]).filter(Boolean)
        ).sort();

        state.displayGuide = best;
        hintLine.textContent = candidates.length
          ? `入力候補例: ${best}${nextChars.length ? " / 次に打てるキー: " + nextChars.join(" ") : ""}`
          : "入力候補がありません";
      }

      function renderStats() {
        const elapsed = state.started
          ? state.finished
            ? state.elapsedMs
            : Date.now() - state.startTime
          : 0;

        const total = state.typedCount + state.mistakes;
        const acc = total > 0 ? (state.typedCount / total) * 100 : 100;
        const minutes = elapsed / 60000;
        const wpm = minutes > 0 ? Math.round((state.correctCount / 5) / minutes) : 0;
        const progressTotal = state.mode === Infinity ? "∞" : state.totalQuestions;

        modeValue.textContent = state.mode === Infinity ? "∞" : `${state.mode}問`;
        progressValue.textContent = `${Math.min(state.index + (state.finished ? 1 : 0), state.mode === Infinity ? state.index + 1 : state.totalQuestions)} / ${progressTotal}`;
        timeValue.textContent = `${(elapsed / 1000).toFixed(2)}s`;
        accuracyValue.textContent = `${acc.toFixed(1)}%`;
        missValue.textContent = `${state.mistakes}`;
        wpmValue.textContent = `${wpm}`;

        if (!state.current) {
          progressValue.textContent = "0 / 0";
          modeValue.textContent = "未選択";
          timeValue.textContent = "0.00s";
          accuracyValue.textContent = "100.0%";
          missValue.textContent = "0";
          wpmValue.textContent = "0";
        }
      }

      function renderCurrent() {
        if (!state.current) {
          kanjiDisplay.textContent = "四字熟語";
          kanaDisplay.textContent = "よみがな";
          statusMini.textContent = "モードを選ぶと開始できます";
          renderTyping();
          renderStats();
          return;
        }

        kanjiDisplay.textContent = state.current.kanji;
        kanaDisplay.textContent = state.current.kana;
        if (!state.started) {
          statusMini.textContent = "最初のキー入力で計測開始";
        } else if (state.finished) {
          statusMini.textContent = "終了";
        } else {
          statusMini.textContent = "そのまま入力してください";
        }
        renderTyping();
        renderStats();
      }

      function updateTimer() {
        renderStats();
      }

      function startTimerIfNeeded() {
        if (state.started) return;
        state.started = true;
        state.startTime = Date.now();
        if (state.timerId) clearInterval(state.timerId);
        state.timerId = setInterval(updateTimer, 50);
      }

      function stopTimer() {
        if (!state.started) return;
        state.elapsedMs = Date.now() - state.startTime;
        state.finished = true;
        if (state.timerId) clearInterval(state.timerId);
        state.timerId = null;
      }

      function nextQuestion() {
        state.accepted = "";

        if (state.mode === Infinity) {
          const item = getInfiniteItem();
          state.current = {
            ...item,
            candidates: buildRomanizations(item.kana)
          };
          renderCurrent();
          return;
        }

        if (state.index >= state.queue.length) {
          finishGame();
          return;
        }

        const item = state.queue[state.index];
        state.current = {
          ...item,
          candidates: buildRomanizations(item.kana)
        };
        renderCurrent();
      }

      function startGame(modeValueSelected) {
        state.mode = modeValueSelected;
        state.totalQuestions = modeValueSelected === Infinity ? Infinity : modeValueSelected;
        state.started = false;
        state.finished = false;
        state.startTime = null;
        state.elapsedMs = 0;
        state.index = 0;
        state.accepted = "";
        state.mistakes = 0;
        state.typedCount = 0;
        state.correctCount = 0;
        state.queue = createQueue(modeValueSelected);
        state.current = null;
        if (state.timerId) clearInterval(state.timerId);
        state.timerId = null;

        document.querySelectorAll(".mode-btn").forEach(btn => {
          btn.classList.toggle("active", String(btn.dataset.value) === String(modeValueSelected));
        });

        nextQuestion();
      }

      function finishGame() {
        stopTimer();
        renderCurrent();

        const total = state.typedCount + state.mistakes;
        const accuracy = total > 0 ? (state.typedCount / total) * 100 : 100;
        statusMini.textContent = `終了 / 正確率 ${accuracy.toFixed(1)}% / タイム ${(state.elapsedMs / 1000).toFixed(2)}s`;
        kanjiDisplay.textContent = "結果";
        kanaDisplay.textContent = "ランキングに記録しました";
        typingLine.innerHTML = `<span class="typed-correct">正確率 ${accuracy.toFixed(1)}%　タイム ${(state.elapsedMs / 1000).toFixed(2)}s</span>`;
        hintLine.textContent = "同じモードで再挑戦するか、別のモードを選んでください";
        saveRanking();
        renderRanking();
      }

      function saveRanking() {
        if (state.mode === Infinity) return;

        const rows = loadRanking();
        const total = state.typedCount + state.mistakes;
        const accuracy = total > 0 ? (state.typedCount / total) * 100 : 100;

        rows.push({
          mode: state.mode,
          accuracy: Number(accuracy.toFixed(2)),
          timeMs: state.elapsedMs,
          misses: state.mistakes,
          date: new Date().toLocaleString("ja-JP")
        });

        rows.sort((a, b) => {
          if (b.accuracy !== a.accuracy) return b.accuracy - a.accuracy;
          if (a.timeMs !== b.timeMs) return a.timeMs - b.timeMs;
          return a.misses - b.misses;
        });

        localStorage.setItem(STORAGE_KEY, JSON.stringify(rows.slice(0, 10)));
      }

      function loadRanking() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch {
          return [];
        }
      }

      function renderRanking() {
        const rows = loadRanking();
        if (!rows.length) {
          rankArea.innerHTML = `<div class="empty">まだ記録がありません</div>`;
          return;
        }

        const html = `
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>モード</th>
                <th>正確率</th>
                <th>タイム</th>
                <th>ミス</th>
                <th>日時</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((r, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td>${r.mode}問</td>
                  <td>${Number(r.accuracy).toFixed(2)}%</td>
                  <td>${(r.timeMs / 1000).toFixed(2)}s</td>
                  <td>${r.misses}</td>
                  <td>${escapeHtml(r.date)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
        rankArea.innerHTML = html;
      }

      function handleCorrectChar(ch) {
        startTimerIfNeeded();
        state.accepted += ch;
        state.typedCount += 1;
        state.correctCount += 1;
        playKeySound(false);

        const matches = getMatchingCandidates(state.accepted);
        if (!matches.length) {
          state.mistakes += 1;
          playKeySound(true);
        }

        const completed = matches.some(c => c === state.accepted);
        if (completed) {
          playCompleteSound();
          state.index += 1;
          if (state.mode === Infinity) {
            nextQuestion();
          } else if (state.index >= state.totalQuestions) {
            finishGame();
          } else {
            nextQuestion();
          }
          return;
        }

        renderCurrent();
      }

      function handleWrongChar() {
        if (!state.current || state.finished) return;
        startTimerIfNeeded();
        state.mistakes += 1;
        playKeySound(true);
        renderCurrent();
      }

      function validTypingKey(e) {
        if (e.ctrlKey || e.metaKey || e.altKey) return null;
        const k = e.key;
        if (!k || k.length !== 1) return null;
        if (/^[a-zA-Z'-]$/.test(k)) return k.toLowerCase();
        return null;
      }

      function onKeyDown(e) {
        const ch = validTypingKey(e);
        if (!ch) return;
        if (!state.current || state.finished) return;

        e.preventDefault();

        const trial = state.accepted + ch;
        const matches = getMatchingCandidates(trial);
        if (matches.length) {
          handleCorrectChar(ch);
        } else {
          handleWrongChar();
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function ensureAudio() {
        if (!state.keySoundOn) return null;
        if (!state.audioCtx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) return null;
          state.audioCtx = new Ctx();
        }
        if (state.audioCtx.state === "suspended") state.audioCtx.resume();
        return state.audioCtx;
      }

      function tone(freq, duration, type = "sine", gainValue = 0.025) {
        const ctx = ensureAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(gainValue, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + duration + 0.02);
      }

      function playKeySound(isError) {
        if (!state.keySoundOn) return;
        if (isError) {
          tone(180, 0.08, "square", 0.03);
        } else {
          tone(720, 0.045, "triangle", 0.018);
        }
      }

      function playCompleteSound() {
        if (!state.keySoundOn) return;
        tone(520, 0.06, "triangle", 0.02);
        setTimeout(() => tone(780, 0.08, "triangle", 0.02), 45);
      }

      function buildModeButtons() {
        modeGrid.innerHTML = modes.map(m => `
          <button class="mode-btn" data-value="${m.value}">
            ${m.label}
          </button>
        `).join("");

        modeGrid.querySelectorAll(".mode-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const v = btn.dataset.value === "Infinity" ? Infinity : Number(btn.dataset.value);
            startGame(v);
          });
        });
      }

      restartBtn.addEventListener("click", () => {
        if (state.mode == null) return;
        startGame(state.mode);
      });

      soundBtn.addEventListener("click", () => {
        state.keySoundOn = !state.keySoundOn;
        soundBtn.textContent = `効果音: ${state.keySoundOn ? "ON" : "OFF"}`;
        if (state.keySoundOn) ensureAudio();
      });

      rankResetBtn.addEventListener("click", () => {
        if (!confirm("ランキングを初期化しますか？")) return;
        localStorage.removeItem(STORAGE_KEY);
        renderRanking();
      });

      window.addEventListener("keydown", onKeyDown);

      buildModeButtons();
      renderRanking();
      renderCurrent();
    })();
  </script>
</body>
</html>
