<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>四字熟語ローマ字タイピング</title>
  <style>
    :root{
      --bg:#f7f8fb;
      --panel:#ffffff;
      --text:#111827;
      --sub:#6b7280;
      --line:#dbe2ea;
      --accent:#111827;
      --ok:#16a34a;
      --ng:#dc2626;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:20px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,#f9fbff 0%, #f3f5f9 100%);
      color:var(--text);
      font-family:
        "Hiragino Sans","Yu Gothic","Meiryo","Noto Sans JP",
        system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
    }
    body{
      min-height:100vh;
    }

    .wrap{
      width:min(1100px, 92vw);
      margin:0 auto;
      padding:24px 0 56px;
    }

    .top{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      justify-content:center;
      margin-bottom:18px;
    }

    .title{
      width:100%;
      text-align:center;
      font-size:clamp(26px,4vw,40px);
      font-weight:800;
      letter-spacing:.04em;
      margin:8px 0 6px;
    }

    .mode-group, .control-group{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    button, select, input{
      font:inherit;
    }

    .btn{
      border:none;
      background:var(--panel);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:999px;
      padding:12px 18px;
      cursor:pointer;
      transition:.15s ease;
      box-shadow:0 2px 8px rgba(0,0,0,.03);
      font-weight:700;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.active{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }
    .btn.primary{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    .game-panel{
      background:var(--panel);
      border:1px solid rgba(17,24,39,.06);
      box-shadow:var(--shadow);
      border-radius:28px;
      min-height:430px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:28px 20px 30px;
      position:relative;
      overflow:hidden;
    }

    .status-top{
      position:absolute;
      top:18px;
      left:20px;
      right:20px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--sub);
      font-size:14px;
      font-weight:700;
      flex-wrap:wrap;
    }

    .center-area{
      width:min(900px, 100%);
      margin-top:18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    .message{
      min-height:1.8em;
      font-size:15px;
      color:var(--sub);
      font-weight:700;
    }

    .yoji{
      font-size:clamp(44px, 8vw, 86px);
      line-height:1.1;
      font-weight:900;
      letter-spacing:.08em;
      word-break:keep-all;
    }

    .kana{
      font-size:clamp(22px, 3.2vw, 34px);
      color:var(--sub);
      font-weight:800;
      letter-spacing:.08em;
    }

    .roman-guide{
      width:min(880px, 100%);
      font-size:clamp(20px, 3vw, 32px);
      font-weight:900;
      line-height:1.5;
      letter-spacing:.04em;
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px 20px;
      word-break:break-all;
      min-height:96px;
    }

    .roman-guide .done{ color:var(--ok); }
    .roman-guide .current{
      color:#fff;
      background:var(--text);
      border-radius:8px;
      padding:.04em .22em;
      margin:0 .02em;
    }
    .roman-guide .rest{ color:#9ca3af; }

    .typing-box{
      width:min(760px, 100%);
      background:#fff;
      border:2px solid var(--line);
      border-radius:18px;
      padding:16px 18px;
      font-size:clamp(20px, 3vw, 30px);
      font-weight:800;
      min-height:72px;
      text-align:left;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
      word-break:break-all;
    }
    .typing-box.ok{ border-color:#bbf7d0; background:#f0fdf4; }
    .typing-box.miss{ border-color:#fecaca; background:#fef2f2; }

    .typing-box .typed-ok{color:var(--ok)}
    .typing-box .typed-ng{color:var(--ng); text-decoration:underline}
    .typing-box .typed-rest{color:#9ca3af}

    .bottom{
      margin-top:22px;
      display:grid;
      grid-template-columns:1.3fr .9fr;
      gap:18px;
      align-items:start;
    }

    .card{
      background:var(--panel);
      border:1px solid rgba(17,24,39,.06);
      box-shadow:var(--shadow);
      border-radius:22px;
      padding:18px;
    }

    .card h2{
      margin:0 0 14px;
      font-size:20px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 10px;
      text-align:center;
    }

    .stat .label{
      display:block;
      font-size:12px;
      color:var(--sub);
      margin-bottom:6px;
      font-weight:700;
    }
    .stat .value{
      display:block;
      font-size:22px;
      font-weight:900;
    }

    .name-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .name-row input{
      flex:1;
      min-width:180px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }
    th, td{
      padding:10px 8px;
      border-bottom:1px solid #edf2f7;
      text-align:left;
      vertical-align:top;
    }
    th{
      font-size:12px;
      color:var(--sub);
      letter-spacing:.04em;
    }
    td.rank{
      width:56px;
      font-weight:900;
    }

    .footer-note{
      margin-top:10px;
      color:var(--sub);
      font-size:12px;
      line-height:1.7;
    }

    .hidden-input{
      position:absolute;
      opacity:0;
      pointer-events:none;
      width:1px;
      height:1px;
    }

    .end-actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      margin-top:10px;
    }

    .small{
      font-size:12px;
      color:var(--sub);
      font-weight:700;
    }

    @media (max-width: 860px){
      .bottom{
        grid-template-columns:1fr;
      }
      .stats{
        grid-template-columns:repeat(2, 1fr);
      }
      .status-top{
        position:static;
        justify-content:center;
        margin-bottom:8px;
      }
      .game-panel{
        min-height:390px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">四字熟語 ローマ字タイピング</div>

      <div class="mode-group" id="modeGroup">
        <button class="btn active" data-mode="10">10問</button>
        <button class="btn" data-mode="20">20問</button>
        <button class="btn" data-mode="30">30問</button>
        <button class="btn" data-mode="40">40問</button>
        <button class="btn" data-mode="50">50問</button>
        <button class="btn" data-mode="100">100問</button>
        <button class="btn" data-mode="endless">終わりなし</button>
      </div>

      <div class="control-group">
        <button class="btn primary" id="startBtn">スタート</button>
        <button class="btn" id="resetBtn">リセット</button>
      </div>
    </div>

    <section class="game-panel" id="gamePanel">
      <div class="status-top">
        <div id="statusMode">モード: 10問</div>
        <div id="statusProgress">問題: 0 / 10</div>
        <div id="statusTimer">タイム: 0.00秒</div>
      </div>

      <div class="center-area">
        <div class="message" id="message">スタートを押すと開始します。最初のキー入力で計測開始。</div>
        <div class="yoji" id="yoji">四字熟語</div>
        <div class="kana" id="kana">しじゅくご</div>
        <div class="roman-guide" id="romanGuide">shijukugo</div>
        <div class="typing-box" id="typingBox">ここに入力状況が表示されます</div>
        <input class="hidden-input" id="hiddenInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" />
        <div class="end-actions">
          <span class="small">画面のどこを押しても入力できます</span>
        </div>
      </div>
    </section>

    <div class="bottom">
      <section class="card">
        <h2>今回の成績</h2>
        <div class="stats">
          <div class="stat">
            <span class="label">正確率</span>
            <span class="value" id="accuracyView">0%</span>
          </div>
          <div class="stat">
            <span class="label">タイム</span>
            <span class="value" id="timeView">0.00秒</span>
          </div>
          <div class="stat">
            <span class="label">正打鍵数</span>
            <span class="value" id="correctView">0</span>
          </div>
          <div class="stat">
            <span class="label">ミス数</span>
            <span class="value" id="missView">0</span>
          </div>
        </div>
        <div class="footer-note">
          正確率が高い順で順位を決定。正確率が同じ場合はタイムが短い方が上位。<br>
          終わりなしモードはランキング対象外です。
        </div>
      </section>

      <section class="card">
        <h2>ランキング ベスト10</h2>
        <div class="name-row">
          <input id="playerName" maxlength="16" placeholder="名前を入力（例: AAA）" />
          <button class="btn" id="saveScoreBtn">成績を保存</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>順位</th>
              <th>名前</th>
              <th>モード</th>
              <th>正確率</th>
              <th>タイム</th>
              <th>日時</th>
            </tr>
          </thead>
          <tbody id="rankingBody"></tbody>
        </table>
      </section>
    </div>
  </div>

  <script>

    const ROMA = {
      "あ":["a"], "い":["i","yi"], "う":["u","wu","whu"], "え":["e"], "お":["o"],
      "か":["ka","ca"], "き":["ki"], "く":["ku","cu","qu"], "け":["ke"], "こ":["ko","co"],

      "ぁ":["xa","la"], "ぃ":["xi","li"], "ぅ":["xu","lu"], "ぇ":["xe","le"], "ぉ":["xo","lo"],

    function escapeHtml(str){
      return str
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function shuffle(arr){
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function chooseProblems(mode){
      if(mode === "endless"){
        return [];
      }
      const count = Number(mode);
      const base = shuffle(WORDS);
      const result = [];
      while(result.length < count){
        result.push(...shuffle(base));
      }
      return result.slice(0, count);
    }

    function isSmallKana(ch){
      return ["ゃ","ゅ","ょ","ぁ","ぃ","ぅ","ぇ","ぉ"].includes(ch);
    }

    function splitKanaUnits(text){
      const units = [];
      for(let i=0;i<text.length;i++){
        const ch = text[i];
        const next = text[i+1];
        if(next && isSmallKana(next)){
          units.push(ch + next);
          i++;
        } else {
          units.push(ch);
        }
      }
      return units;
    }

    function consonantOfRoma(roma){
      if(!roma) return "";
      const m = roma.match(/^[bcdfghjklmnpqrstvwxyz]+/i);
      return m ? m[0][0].toLowerCase() : "";
    }

    function getNextKana(units, idx){
      return units[idx+1] || "";
    }

    function getOptionsForUnit(units, idx){
      const unit = units[idx];
      const next = getNextKana(units, idx);

      if(unit === "っ"){
        const options = [...(ROMA["っ"] || [])];
        if(next){
          const nextOptions = getOptionsForUnit(units, idx+1);
          const initials = [...new Set(
            nextOptions
              .map(consonantOfRoma)
              .filter(c => c && c !== "n")
          )];
          initials.forEach(c => options.push(c));
        }
        return [...new Set(options)];
      }

      if(unit === "ん"){
        const options = [...(ROMA["ん"] || ["n","nn"])];
        if(next){
          const nextOptions = getOptionsForUnit(units, idx+1);
          const initials = [...new Set(
            nextOptions
              .map(consonantOfRoma)
              .filter(Boolean)
          )];
          const danger = ["a","i","u","e","o","y","n"];
          if(initials.some(c => danger.includes(c))){
            return options.filter(x => x !== "n");
          }
        }
        return options;
      }

      return ROMA[unit] || [unit];
    }

    function buildCandidatesFromKana(kanaText){
      const units = splitKanaUnits(kanaText);
      let list = [""];
      for(let i=0;i<units.length;i++){
        const opts = getOptionsForUnit(units, i);
        const nextList = [];
        for(const base of list){
          for(const opt of opts){
            nextList.push(base + opt);
          }
        }
        const unique = [...new Set(nextList)];
        unique.sort((a,b)=>a.length-b.length);
        list = unique.slice(0, 300);
      }
      return [...new Set(list)].sort((a,b)=>a.length-b.length || a.localeCompare(b));
    }

    function pickActiveCandidate(userTyped){
      const matched = candidates.filter(c => c.startsWith(userTyped));
      if(matched.length === 0){
        return activeCandidate || candidates[0] || "";
      }
      matched.sort((a,b)=>{
        const al = a.length - userTyped.length;
        const bl = b.length - userTyped.length;
        if(al !== bl) return al - bl;
        return a.localeCompare(b);
      });
      return matched[0];
    }

    function renderRomanGuide(){
      const done = escapeHtml(typed);
      const current = activeCandidate[typed.length] || "";
      const rest = activeCandidate.slice(typed.length + (current ? 1 : 0));

      romanGuide.innerHTML =
        `<span class="done">${done}</span>` +
        (current ? `<span class="current">${escapeHtml(current)}</span>` : "") +
        `<span class="rest">${escapeHtml(rest)}</span>`;
    }

    function renderTypingBox(lastMiss=false){
      const ok = escapeHtml(typedHistory);
      typingBox.innerHTML = `
        <span class="typed-ok">${ok}</span>
        <span class="typed-ng">${lastMiss ? "×" : ""}</span>
        <span class="typed-rest">${escapeHtml(activeCandidate.slice(typed.length))}</span>
      `;
      typingBox.classList.toggle("ok", typed.length > 0 && !lastMiss);
      typingBox.classList.toggle("miss", lastMiss);
    }

    function updateStats(){
      const total = correctCount + missCount;
      const acc = total ? (correctCount / total) * 100 : 0;
      accuracyView.textContent = acc.toFixed(1) + "%";
      timeView.textContent = elapsed.toFixed(2) + "秒";
      correctView.textContent = correctCount;
      missView.textContent = missCount;
    }

    function updateHeader(){
      statusMode.textContent = "モード: " + (selectedMode === "endless" ? "終わりなし" : selectedMode + "問");
      const totalLabel = selectedMode === "endless" ? "∞" : problemSet.length;
      statusProgress.textContent = `問題: ${Math.min(currentIndex, totalLabel === "∞" ? currentIndex : problemSet.length)} / ${totalLabel}`;
      statusTimer.textContent = `タイム: ${elapsed.toFixed(2)}秒`;
    }

    function tick(){
      if(!started || finished) return;
      elapsed = (performance.now() - startTime) / 1000;
      updateHeader();
      updateStats();
    }

    function startTimerIfNeeded(){
      if(started) return;
      started = true;
      startTime = performance.now();
      timerId = setInterval(tick, 30);
      message.textContent = "入力中…";
    }

    function setCurrentWord(word){
      currentWord = word;
      candidates = buildCandidatesFromKana(word.kana);
      activeCandidate = candidates[0] || "";
      typed = "";
      typedHistory = "";
      yoji.textContent = word.kanji;
      kana.textContent = word.kana;
      renderRomanGuide();
      renderTypingBox(false);
      updateHeader();
      hiddenInput.value = "";
      hiddenInput.focus();
    }

    function nextWord(){
      if(selectedMode === "endless"){
        const word = WORDS[Math.floor(Math.random() * WORDS.length)];
        currentIndex++;
        setCurrentWord(word);
        return;
      }

      if(currentIndex >= problemSet.length){
        finishGame();
        return;
      }
      const word = problemSet[currentIndex];
      currentIndex++;
      setCurrentWord(word);
    }

    function startGame(){
      clearInterval(timerId);
      timerId = null;
      started = false;
      finished = false;
      elapsed = 0;
      correctCount = 0;
      missCount = 0;
      typedHistory = "";
      currentIndex = 0;
      problemSet = chooseProblems(selectedMode);
      updateStats();
      updateHeader();
      message.textContent = "最初のキー入力で計測開始";
      nextWord();
    }

    function resetGame(){
      clearInterval(timerId);
      timerId = null;
      started = false;
      finished = false;
      elapsed = 0;
      correctCount = 0;
      missCount = 0;
      typedHistory = "";
      currentIndex = 0;
      currentWord = null;
      candidates = [];
      activeCandidate = "";
      typed = "";
      yoji.textContent = "四字熟語";
      kana.textContent = "しじゅくご";
      romanGuide.textContent = "shijukugo";
      typingBox.textContent = "ここに入力状況が表示されます";
      typingBox.classList.remove("ok","miss");
      message.textContent = "スタートを押すと開始します。最初のキー入力で計測開始。";
      updateStats();
      updateHeader();
    }

    function finishGame(){
      finished = true;
      clearInterval(timerId);
      timerId = null;
      tick();
      message.textContent = "終了しました。名前を入れて成績を保存できます。";
      yoji.textContent = "終了";
      kana.textContent = "";
      romanGuide.textContent = "おつかれさまでした";
      typingBox.textContent = "下のランキングに保存できます";
      typingBox.classList.remove("ok","miss");
    }

    function getResultObject(){
      const total = correctCount + missCount;
      const accuracy = total ? (correctCount / total) * 100 : 0;
      return {
        name: (playerName.value || "NO NAME").trim().slice(0,16) || "NO NAME",
        mode: selectedMode,
        accuracy: Number(accuracy.toFixed(1)),
        time: Number(elapsed.toFixed(2)),
        correct: correctCount,
        miss: missCount,
        createdAt: new Date().toLocaleString("ja-JP")
      };
    }

    function loadRanking(){
      try{
        return JSON.parse(localStorage.getItem("yojiRomaRanking") || "[]");
      }catch{
        return [];
      }
    }

    function saveRankingData(data){
      localStorage.setItem("yojiRomaRanking", JSON.stringify(data));
    }

    function sortRanking(list){
      return [...list].sort((a,b)=>{
        if(b.accuracy !== a.accuracy) return b.accuracy - a.accuracy;
        if(a.time !== b.time) return a.time - b.time;
        return (b.correct - a.correct);
      }).slice(0,10);
    }

    function renderRanking(){
      const ranking = sortRanking(loadRanking());
      if(ranking.length === 0){
        rankingBody.innerHTML = `<tr><td colspan="6" style="color:#6b7280;">まだ記録がありません</td></tr>`;
        return;
      }
      rankingBody.innerHTML = ranking.map((r,i)=>`
        <tr>
          <td class="rank">${i+1}</td>
          <td>${escapeHtml(r.name)}</td>
          <td>${r.mode === "endless" ? "終わりなし" : escapeHtml(String(r.mode)+"問")}</td>
          <td>${r.accuracy.toFixed(1)}%</td>
          <td>${r.time.toFixed(2)}秒</td>
          <td>${escapeHtml(r.createdAt)}</td>
        </tr>
      `).join("");
    }

    function saveScore(){
      if(!finished){
        alert("終了後に保存できます。");
        return;
      }
      if(selectedMode === "endless"){
        alert("終わりなしモードはランキング対象外です。");
        return;
      }
      const ranking = loadRanking();
      ranking.push(getResultObject());
      saveRankingData(sortRanking(ranking));
      renderRanking();
      message.textContent = "ランキングに保存しました。";
    }

    function handleCharInput(ch){
      if(finished || !currentWord) return;
      if(!/^[a-z]$/i.test(ch)) return;

      startTimerIfNeeded();
      ch = ch.toLowerCase();

      const nextTyped = typed + ch;
      const matched = candidates.filter(c => c.startsWith(nextTyped));

      if(matched.length > 0){
        typed = nextTyped;
        typedHistory += ch;
        activeCandidate = pickActiveCandidate(typed);
        correctCount++;
        renderRomanGuide();
        renderTypingBox(false);

        if(candidates.includes(typed)){
          setTimeout(()=>{
            if(finished) return;
            nextWord();
          }, 70);
        }
      }else{
        missCount++;
        renderTypingBox(true);
        typingBox.classList.remove("ok");
        setTimeout(()=>{
          renderTypingBox(false);
        }, 80);
      }
      tick();
    }

    document.addEventListener("keydown", (e)=>{
      if(["Tab","Meta","Alt","Control","Shift","Escape"].includes(e.key)) return;

      if(e.key === "Enter"){
        e.preventDefault();
        if(!currentWord || finished){
          startGame();
        }
        return;
      }

      if(e.key.length === 1 && /^[a-zA-Z]$/.test(e.key)){
        e.preventDefault();
        hiddenInput.focus();
        handleCharInput(e.key);
      }
    });

    document.getElementById("gamePanel").addEventListener("click", ()=>{
      hiddenInput.focus();
    });

    hiddenInput.addEventListener("blur", ()=>{
      setTimeout(()=>hiddenInput.focus(), 0);
    });

    hiddenInput.addEventListener("input", ()=>{
      hiddenInput.value = "";
    });

    modeGroup.addEventListener("click", (e)=>{
      const btn = e.target.closest("[data-mode]");
      if(!btn) return;
      [...modeGroup.querySelectorAll(".btn")].forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      selectedMode = btn.dataset.mode;
      resetGame();
      updateHeader();
    });

    startBtn.addEventListener("click", startGame);
    resetBtn.addEventListener("click", resetGame);
    saveScoreBtn.addEventListener("click", saveScore);

    renderRanking();
    resetGame();
  </script>
</body>
</html>
